name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    # Skip running release workflow on forks
    if: github.repository_owner == 'craigsloggett'
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - name: Create a GitHub Release
        id: release
        uses: craigsloggett/create-github-release@a6d7e026efca82f18c173d53789febd4d01bb46e # v1.0.17
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
